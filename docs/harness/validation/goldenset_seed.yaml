# Golden Set Seed — YouTube Appliance VoC Dashboard Harness (v0.1)
#
# 사용법:
#   1. TBD_* 값을 실제 video_id / comment_id 로 교체하세요.
#      - data/processed/{run_id}/comments.parquet 에서 comment_id 확인
#      - data/processed/{run_id}/videos.parquet 에서 video_id 확인
#   2. input_snippet을 실제 댓글 부분 발췌로 교체 (PII 마스킹, 최대 300 chars)
#   3. pytest -q tests/golden 으로 통과 확인
#
# 라벨 값은 코드 내 실제 값(소문자)을 사용합니다:
#   "positive" / "negative" / "neutral" / "excluded"
#
# 스키마/운영 가이드: goldenset.md 참조
# reason_code 전체 목록: audit-log-spec.md 참조

- golden_id: GS-0001
  video_id: TBD_VIDEO_DRYER_COMPARE_202601
  comment_id: TBD_COMMENT_PINNED_AFFILIATE
  language: ko
  case_tags:
    - PROMO
    - PINNED_COMMERCIAL
  input_snippet: "※고정댓글 링크로 구입 시 ... 쿠팡파트너스 ... 네이버쇼핑커넥트 ... 수수료 ..."
  expected:
    sentiment_label: excluded        # 코드 내 실제 값: "excluded"
    promo_flag: true
    eligible_for_representative: false
    eligible_for_keywords: false
    eligible_for_similarity: false
    representative_slot: null
    representative_template_checks:
      header_ok: true
      video_title_label_ok: true
      no_garbled_ok: true
      snippet_only_ok: true
      similar_list_ok: true
    keyword_checks:
      noise_topk_ok: true            # 이 댓글의 토큰이 top-K에 기여하면 안 됨
      label_purity_ok: true
    similarity_checks:
      should_return_empty: true      # excluded 댓글은 유사도 계산 대상 제외
      min_topic_overlap_ok: true
    reason_code: PROMO_DETECTED
  notes: >
    광고/제휴/링크유도 고정댓글이 "positive"로 유입되거나 대표로 선정되면 즉시 실패.
    INV-02, AC-01 검증. NOISE_TERMS 중 "쿠팡", "파트너스", "링크", "고정댓글" 포함 케이스.

- golden_id: GS-0002
  video_id: TBD_VIDEO_WITH_POSITIVE_ZERO
  comment_id: TBD_SCENARIO_ANCHOR_POS_ZERO
  language: ko
  case_tags:
    - COUNT_REP_MISMATCH
  input_snippet: "시나리오 앵커 — 이 영상의 positive count=0 조건에서 positive 대표가 표시되면 실패"
  expected:
