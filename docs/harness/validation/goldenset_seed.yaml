    promo_flag: false
    eligible_for_representative: true
    eligible_for_keywords: true
    eligible_for_similarity: true
    representative_slot: null        # positive count=0이므로 positive 슬롯은 null
    representative_template_checks:
      header_ok: true
      video_title_label_ok: true
      no_garbled_ok: true
      snippet_only_ok: true
      similar_list_ok: true
    keyword_checks:
      noise_topk_ok: true
      label_purity_ok: true
    similarity_checks:
      should_return_empty: false
      min_topic_overlap_ok: true
    reason_code: COUNT_ZERO
  notes: >
    positive count=0인데 positive 대표가 뜨면 즉시 실패 (INV-03, AC-03).
    실제 video_id/comment_id 매핑 필요. 해당 영상에서 positive 댓글이 0건인 케이스를 찾아 교체.

