project_name: youtube-comment-analysis
log_level: INFO
default_language: ko
default_region: KR
daily_quota_limit: 10000
api:
  base_url: https://www.googleapis.com/youtube/v3
  timeout_seconds: 30
  max_retries: 5
  backoff_seconds: 1.5
  max_results_per_page: 50
storage:
  raw_dir: data/raw
  processed_dir: data/processed
  exports_dir: data/exports
  logs_dir: data/logs
collection:
  video_selection:
    enabled: true
    search_oversample_factor: 3
    require_product_term: true
    require_target_brand: false
    exclude_competitor_brands: true
    target_brand_terms:
      - lg
      - 엘지
      - 오브제
      - 디오스
      - 트롬
      - 휘센
      - lg전자
    competitor_brand_terms:
      - samsung
      - 삼성
      - bespoke
      - whirlpool
      - ge
      - electrolux
      - bosch
      - haier
      - miele
      - frigidaire
    product_terms:
      - 가전
      - 냉장고
      - 세탁기
      - 건조기
      - 식기세척기
      - 청소기
      - 오븐
      - 정수기
      - 인덕션
      - washer
      - dryer
      - refrigerator
      - fridge
      - dishwasher
      - appliance
    preferred_channel_keywords: []
    blocked_channel_keywords: []
analytics:
  top_n_keywords: 30
  max_representative_comments: 5
  topic_count: 6
  risk_keywords:
    - 배송
    - 불량
    - 가격
    - AS
    - 소음
    - 발열
    - 품질
excel:
  datetime_format: yyyy-mm-dd hh:mm:ss
  freeze_panes: A2
dashboard:
  supported_regions:
    - KR
    - US
  primary_product_filters:
    - 냉장고
    - 세탁기
    - 건조기
    - 식기세척기
    - 청소기
    - 오븐
  extra_product_filters:
    - 정수기
    - 인덕션
    - 와인셀러
    - 컵세척기
    - 실내식물재배기(틔운)
  brand_filter_options:
    - LG
    - Samsung
    - GE
    - Whirlpool
  build_label: stable
  cache_schema_version: dashboard-v2
  lite_comments_limit: 1000
  weekly_chart_page_min: 4
  weekly_chart_page_max: 24
  weekly_chart_page_default: 12
  weekly_chart_page_step: 2
  mpl_font_candidates:
    - fonts/NanumGothic.ttf
    - C:/Windows/Fonts/malgun.ttf
    - C:/Windows/Fonts/NanumGothic.ttf
